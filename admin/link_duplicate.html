<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লিঙ্ক ডুপ্লিকেট চেকার - সুপাবেস</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #ec4899;
            --accent: #f59e0b;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Hind Siliguri', 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-main);
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 40px;
            max-width: 900px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            background: linear-gradient(to right, #6366f1, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .table-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
        }

        .table-btn {
            padding: 14px 10px;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .table-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.1);
        }

        .table-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #f8fafc;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #f1f5f9;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: scale(1.02);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
        }

        .results-panel {
            background: #fff;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .results-header {
            padding: 15px 20px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .duplicates-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .duplicate-item {
            padding: 16px 20px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            transition: background 0.2s ease;
        }

        .duplicate-item:hover {
            background: #fdf2f8;
        }

        .url-box {
            font-size: 0.9rem;
            color: #475569;
            font-family: 'Inter', monospace;
            word-break: break-all;
            flex: 1;
        }

        .count-badge {
            background: #fee2e2;
            color: #ef4444;
            padding: 4px 12px;
            border-radius: 99px;
            font-weight: 700;
            font-size: 0.85rem;
            white-space: nowrap;
            border: 1px solid #fecaca;
        }

        .message-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
            }

            to {
                transform: translateX(0);
            }
        }

        .toast-success {
            background: #10b981;
            display: block;
        }

        .toast-error {
            background: #ef4444;
            display: block;
        }

        .toast-info {
            background: #6366f1;
            display: block;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 640px) {
            .container {
                padding: 25px 20px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .stats-container {
                grid-template-columns: 1fr;
            }

            .table-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔍 লিঙ্ক ডুপ্লিকেট চেকার</h1>

        <!-- Stats Overview -->
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-value" id="totalRecords">0</div>
                <div class="stat-label">মোট এন্ট্রি</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="duplicateCountValue">0</div>
                <div class="stat-label">ডুপ্লিকেট গ্রুপ</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="selectedTableCode">None</div>
                <div class="stat-label">সিলেক্টেড টেবিল</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">
                <span>📁 সোর্স টেবিল নির্বাচন করুন</span>
                <div id="loader" class="loader"></div>
            </div>
            <div class="table-grid">
                <button class="table-btn active" data-table="post_site">Posts</button>
                <button class="table-btn" data-table="bangla_quotes_1">Bangla 1</button>
                <button class="table-btn" data-table="bangla_quotes_2">Bangla 2</button>
                <button class="table-btn" data-table="bangla_quotes_3">Bangla 3</button>
                <button class="table-btn" data-table="bangla_quotes_4">Bangla 4</button>
                <button class="table-btn" data-table="photography_1">Photo 1</button>
                <button class="table-btn" data-table="photography_2">Photo 2</button>
                <button class="table-btn" data-table="photography_3">Photo 3</button>
                <button class="table-btn" data-table="photography_4">Photo 4</button>
                <button class="table-btn" data-table="dotted_illustration_1">Dotted 1</button>
                <button class="table-btn" data-table="dotted_illustration_2">Dotted 2</button>
                <button class="table-btn" data-table="illustration_1">Illus 1</button>
                <button class="table-btn" data-table="illustration_2">Illus 2</button>
                <button class="table-btn" data-table="english_quote_1">English 1</button>
                <button class="table-btn" data-table="english_quote_2">English 2</button>
                <button class="table-btn" data-table="id_password">Credentials</button>
            </div>
        </div>

        <!-- Duplicates Results -->
        <div id="duplicatesSection" class="section" style="display: none;">
            <div class="section-title">🚨 প্রাপ্ত ডুপ্লিকেট সমস্যা সমূহ</div>
            <div class="results-panel">
                <div class="results-header">
                    <span id="resultsSubtitle"
                        style="font-weight: 600; color: var(--text-muted); font-size: 0.9rem;">Filtering data...</span>
                    <button onclick="bulkDeleteAll()" id="bulkDeleteBtn"
                        style="display: none; background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 700; transition: all 0.2s;">
                        🗑️ সব ডুপ্লিকেট একসাথে মুছুন
                    </button>
                </div>
                <div id="duplicatesList" class="duplicates-list">
                    <!-- Results injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="messageBox" class="message-toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://mwkoqxtyxdkkqlakrrvd.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im13a29xeHR5eGRra3FsYWtycnZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY2NzYzODcsImV4cCI6MjA4MjI1MjM4N30.2SvderBmI6Ick5Z91M4hrmJwKuXQZmvwWxQOpZod1kg';
        const supabaseClient = window.supabase?.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentTable = 'post_site';

        async function selectTable(tableName, button) {
            currentTable = tableName;
            document.querySelectorAll('.table-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');

            document.getElementById('selectedTableCode').textContent = tableName;
            document.getElementById('duplicatesSection').style.display = 'none';
            document.getElementById('duplicatesList').innerHTML = '';
            document.getElementById('totalRecords').textContent = '...';
            document.getElementById('duplicateCountValue').textContent = '...';
            document.getElementById('loader').style.display = 'block';

            await checkDuplicates(tableName);
            document.getElementById('loader').style.display = 'none';
        }

        let hasIdColumn = true;

        async function checkDuplicates(tableName) {
            try {
                // Using select('*') prevents 400 errors when 'id' or other columns are missing.
                // It dynamically adapts to the table's schema.
                const { data, count, error } = await supabaseClient
                    .from(tableName)
                    .select('*', { count: 'exact' });

                if (error) throw error;

                // Detect if 'id' column exists based on the data returned
                hasIdColumn = data.length > 0 && 'id' in data[0];

                processDuplicateData(data, count, tableName);

            } catch (err) {
                console.error('Error fetching data:', err);
                showToast(`❌ ডেটা আনতে ব্যর্থ: ${err.message}`, 'error');
            }
        }

        function processDuplicateData(data, totalCount, tableName) {
            document.getElementById('totalRecords').textContent = totalCount;

            const counts = {};
            // Group data by image_url and store their IDs
            data.forEach(item => {
                const url = item.image_url;
                if (!counts[url]) counts[url] = [];
                counts[url].push(item.id || null);
            });

            const duplicates = Object.entries(counts)
                .filter(([url, ids]) => ids.length > 1)
                .sort((a, b) => b[1].length - a[1].length);

            document.getElementById('duplicateCountValue').textContent = duplicates.length;
            const bulkBtn = document.getElementById('bulkDeleteBtn');

            if (duplicates.length > 0) {
                bulkBtn.style.display = 'block';
                const listElement = document.getElementById('duplicatesList');
                document.getElementById('resultsSubtitle').textContent = `${duplicates.length}টি ডুপ্লিকেট গ্রুপ পাওয়া গেছে`;
                document.getElementById('duplicatesSection').style.display = 'block';

                duplicates.forEach(([url, ids]) => {
                    const item = document.createElement('div');
                    item.className = 'duplicate-item';
                    item.innerHTML = `
                        <div class="url-box">${url}</div>
                        <div style="display: flex; flex-direction: column; align-items: end; gap: 8px;">
                            <div class="count-badge">${ids.length} বার</div>
                            <button onclick="deleteDuplicateGroup('${url}', '${tableName}')" 
                                    style="padding: 6px 12px; font-size: 0.75rem; background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; border-radius: 8px; cursor: pointer; font-weight: 700; transition: all 0.2s;">
                                🗑️ মুছুন
                            </button>
                        </div>
                    `;
                    listElement.appendChild(item);
                });
                showToast(`✅ ${duplicates.length}টি ডুপ্লিকেট গ্রুপ পাওয়া গেছে।`, 'info');
            } else {
                bulkBtn.style.display = 'none';
                showToast('✨ এই টেবিলে কোনো ডুপ্লিকেট লিংক নেই।', 'success');
            }
        }

        async function deleteDuplicateGroup(url, tableName) {
            if (!confirm(`আপনি কি এই লিঙ্কটির ডুপ্লিকেটগুলো মুছে দিতে চান? একটি কপি রেখে বাকিগুলো মুছে ফেলা হবে।`)) return;

            try {
                showToast('⏳ প্রসেস হচ্ছে...', 'info');

                if (hasIdColumn) {
                    // ID exists: Get all rows and delete all but the last one
                    const { data, error } = await supabaseClient
                        .from(tableName)
                        .select('id')
                        .eq('image_url', url)
                        .order('id', { ascending: true });

                    if (error) throw error;
                    if (data.length <= 1) return;

                    const idsToDelete = data.slice(0, -1).map(item => item.id);
                    const { error: deleteError } = await supabaseClient
                        .from(tableName)
                        .delete()
                        .in('id', idsToDelete);
                    if (deleteError) throw deleteError;
                } else {
                    // ID does NOT exist: Delete ALL and insert ONE fresh record
                    const { error: deleteError } = await supabaseClient
                        .from(tableName)
                        .delete()
                        .eq('image_url', url);
                    if (deleteError) throw deleteError;

                    const { error: insertError } = await supabaseClient
                        .from(tableName)
                        .insert({ image_url: url });
                    if (insertError) throw insertError;
                }

                showToast(`✅ ডুপ্লিকেট পরিষ্কার করা হয়েছে।`, 'success');
                checkDuplicates(tableName);

            } catch (err) {
                console.error('Delete error:', err);
                showToast(`❌ মুছতে ব্যর্থ: ${err.message}`, 'error');
            }
        }

        async function bulkDeleteAll() {
            if (!confirm(`⚠️ আপনি কি নিশ্চিত যে এই টেবিলের সকল ডুপ্লিকেট একসাথে মুছে ফেলতে চান? প্রতিটি লিঙ্কের শুধু একটি কপি রাখা হবে।`)) return;

            const tableName = currentTable;
            try {
                showToast('⏳ সব ডুপ্লিকেট পরিষ্কার করা হচ্ছে...', 'info');

                // Fetch current data state
                const { data, error } = await supabaseClient.from(tableName).select('*');
                if (error) throw error;

                if (hasIdColumn) {
                    // Strategy: Keep highest ID (newest), delete others
                    const groups = {};
                    data.forEach(item => {
                        if (!groups[item.image_url]) groups[item.image_url] = [];
                        groups[item.image_url].push(item.id);
                    });

                    const idsToDelete = [];
                    Object.values(groups).forEach(ids => {
                        if (ids.length > 1) {
                            ids.sort((a, b) => a - b); // Ascending
                            idsToDelete.push(...ids.slice(0, -1)); // Keep last
                        }
                    });

                    if (idsToDelete.length > 0) {
                        const chunkSize = 100;
                        for (let i = 0; i < idsToDelete.length; i += chunkSize) {
                            await supabaseClient.from(tableName).delete().in('id', idsToDelete.slice(i, i + chunkSize));
                        }
                    }
                } else {
                    // Fallback strategy for tables without personal IDs
                    const counts = {};
                    data.forEach(item => {
                        const url = item.image_url;
                        counts[url] = (counts[url] || 0) + 1;
                    });

                    const duplicateUrls = Object.keys(counts).filter(url => counts[url] > 1);

                    for (const url of duplicateUrls) {
                        await supabaseClient.from(tableName).delete().eq('image_url', url);
                        await supabaseClient.from(tableName).insert({ image_url: url });
                    }
                }

                showToast(`✅ সফল! সব ডুপ্লিকেট রেকর্ড পরিষ্কার করা হয়েছে।`, 'success');
                checkDuplicates(tableName);

            } catch (err) {
                console.error('Bulk delete error:', err);
                showToast(`❌ এরর: ${err.message}`, 'error');
            }
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('messageBox');
            toast.textContent = message;
            toast.className = `message-toast toast-${type}`;
            setTimeout(() => { toast.className = 'message-toast'; }, 3000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.table-btn').forEach(btn => {
                const table = btn.getAttribute('data-table');
                if (table) btn.addEventListener('click', () => selectTable(table, btn));
            });
        });
    </script>
</body>

</html>
