<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kobir Lyrics</title>
    <meta name="description" content="Kobir Lyrics — Free to download and use beautiful aesthetic content.">
    <meta name="theme-color" content="#eeb600">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="app_logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Performance -->
    <link rel="dns-prefetch" href="https://vbfckjroisrhplrpqzkd.supabase.co">
    <link rel="preconnect" href="https://vbfckjroisrhplrpqzkd.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://i.ibb.co">
    <link rel="preconnect" href="https://i.ibb.co" crossorigin>

    <!-- Google Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        /* ===== CSS Variables ===== */
        :root {
            --primary: #eeb600;
            --primary-dark: #c99a00;
            --secondary: #03dac6;
            --bg: #f5f5f5;
            --surface: #ffffff;
            --on-surface: #1a1a1a;
            --on-surface-dim: rgba(0, 0, 0, 0.6);
            --elevation-1: 0 1px 3px rgba(0, 0, 0, 0.12), 0 1px 2px rgba(0, 0, 0, 0.08);
            --elevation-2: 0 3px 6px rgba(0, 0, 0, 0.12), 0 2px 4px rgba(0, 0, 0, 0.08);
            --elevation-4: 0 6px 12px rgba(0, 0, 0, 0.12), 0 4px 6px rgba(0, 0, 0, 0.08);
            --radius: 12px;
            --radius-sm: 8px;
        }

        /* ===== Reset ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--on-surface);
            line-height: 1.5;
            min-height: 100vh;
            padding-bottom: 90px;
        }

        /* ===== App Bar ===== */
        .app-bar {
            background: var(--primary);
            color: #fff;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--elevation-4);
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            transition: transform 0.3s ease;
        }

        .app-bar.hidden {
            transform: translateY(-100%);
        }

        .app-bar-content {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .app-title {
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 0.15px;
            white-space: nowrap;
        }

        .spacer {
            flex: 1;
        }

        .icon-btn {
            color: inherit;
            text-decoration: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* ===== Stats Bar (bottom) ===== */
        .stats-bar {
            max-width: 1400px;
            margin: 12px auto;
            padding: 0 12px;
            text-align: center;
            font-size: 12px;
            color: var(--on-surface-dim);
        }

        /* ===== Site View Counter ===== */
        .site-view-bar {
            max-width: 1400px;
            margin: 8px auto 20px auto;
            padding: 10px 16px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--on-surface-dim);
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--elevation-1);
        }

        .site-view-bar .material-icons {
            font-size: 16px;
            color: var(--primary);
        }

        .site-view-count {
            font-weight: 700;
            color: var(--primary-dark);
            font-size: 15px;
        }

        /* ===== Gallery Container ===== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 8px;
        }

        /* ===== Masonry Gallery ===== */
        .gallery-grid {
            column-count: 5;
            column-gap: 10px;
        }

        /* ===== Skeleton Loading ===== */
        @keyframes shimmer {
            0% {
                background-position: -400px 0;
            }

            100% {
                background-position: 400px 0;
            }
        }

        .skeleton-card {
            break-inside: avoid;
            margin-bottom: 10px;
            border-radius: var(--radius);
            overflow: hidden;
            background: linear-gradient(90deg, #eee 25%, #f5f5f5 37%, #eee 63%);
            background-size: 800px 100%;
            animation: shimmer 1.4s ease infinite;
        }

        .skeleton-card .sk-img {
            width: 100%;
            background: #e8e8e8;
        }

        .skeleton-card .sk-info {
            padding: 10px;
        }

        .skeleton-card .sk-title {
            height: 12px;
            background: #e0e0e0;
            border-radius: 4px;
            width: 70%;
            margin-bottom: 6px;
        }

        .skeleton-card .sk-desc {
            height: 10px;
            background: #e8e8e8;
            border-radius: 4px;
            width: 50%;
        }

        /* ===== Photo Card (bangla_script style) ===== */
        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(16px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .photo-card {
            background: var(--surface);
            border-radius: var(--radius);
            margin-bottom: 10px;
            break-inside: avoid;
            box-shadow: var(--elevation-1);
            transition: box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.25s;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            animation: cardFadeIn 0.45s ease backwards;
        }

        .photo-card:hover {
            box-shadow: var(--elevation-4);
            transform: translateY(-3px);
        }

        .photo-image {
            width: 100%;
            position: relative;
            background: #eee;
            min-height: 120px;
            overflow: hidden;
        }

        .photo-image img {
            width: 100%;
            height: auto;
            display: block;
            opacity: 0;
            transition: opacity 0.5s ease, filter 0.5s ease;
        }

        .photo-image img.loaded {
            opacity: 1;
        }

        /* Category badge on card */
        .photo-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.55);
            color: #fff;
            font-size: 9px;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 10px;
            backdrop-filter: blur(4px);
            letter-spacing: 0.3px;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 2;
        }

        .photo-info {
            padding: 8px 10px;
        }

        .photo-info h3 {
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 1px;
            letter-spacing: 0.1px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .photo-info p {
            font-size: 10px;
            color: var(--on-surface-dim);
            letter-spacing: 0.2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ===== Loading Indicator ===== */
        .loading-indicator {
            display: none;
            text-align: center;
            padding: 24px;
        }

        .loading-indicator.visible {
            display: block;
        }

        .circular-progress {
            display: inline-block;
            width: 36px;
            height: 36px;
            border: 3px solid rgba(238, 182, 0, 0.2);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== Pagination ===== */
        .pagination-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin: 20px auto;
            max-width: 600px;
            padding: 10px;
            background: var(--surface);
            border-radius: 28px;
            box-shadow: var(--elevation-2);
        }

        .page-btn {
            min-width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            color: var(--on-surface);
            border-radius: 18px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
            padding: 0 6px;
            font-family: inherit;
        }

        .page-btn:hover:not(:disabled) {
            background: rgba(238, 182, 0, 0.12);
        }

        .page-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .page-btn.active {
            background: var(--primary);
            color: #fff;
        }

        .page-info {
            font-size: 12px;
            color: var(--on-surface-dim);
            font-weight: 500;
            padding: 0 4px;
        }

        /* ===== Bottom Filter Bar ===== */
        .bottom-bar {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 200;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.06);
            padding: 8px 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
            transform: translateY(100%);
            opacity: 0;
        }

        .bottom-bar.visible {
            transform: translateY(0);
            opacity: 1;
        }

        .filter-scroll {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 0 12px;
            scrollbar-width: none;
            -ms-overflow-style: none;
            max-width: 1400px;
            margin: 0 auto;
        }

        .filter-scroll::-webkit-scrollbar {
            display: none;
        }

        .filter-chip {
            flex-shrink: 0;
            padding: 7px 16px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            background: var(--surface);
            color: var(--on-surface);
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            font-family: inherit;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .filter-chip:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .filter-chip.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 2px 8px rgba(238, 182, 0, 0.3);
        }

        /* ===== Section Filter (dynamic) ===== */
        .section-filter-wrap {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 12px 8px;
        }

        .section-filter-scroll {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .section-filter-scroll::-webkit-scrollbar {
            display: none;
        }

        .section-chip {
            flex-shrink: 0;
            padding: 6px 12px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            background: var(--surface);
            color: var(--on-surface);
            border-radius: 18px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            font-family: inherit;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .section-chip:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .section-chip.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 2px 8px rgba(238, 182, 0, 0.3);
        }

        /* ===== Lightbox ===== */
        .lightbox-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-content {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            max-width: 96vw;
            max-height: 94vh;
            width: 1400px;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            position: relative;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: scale(0.98);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .lightbox-overlay.active .lightbox-content {
            transform: scale(1);
        }

        .lightbox-image-wrapper {
            flex: 1;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 300px;
        }

        .lightbox-image-wrapper img {
            max-width: 100%;
            max-height: 94vh;
            object-fit: contain;
            transition: opacity 0.3s;
            filter: drop-shadow(0 12px 32px rgba(0, 0, 0, 0.3));
        }

        .lightbox-details {
            flex: 0 0 320px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            overflow-y: auto;
            color: rgba(255, 255, 255, 0.9);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
        }

        .lightbox-details h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.3;
            color: #fff;
            letter-spacing: 0.3px;
        }

        .lightbox-details .lb-desc {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            flex: 1;
        }

        .lightbox-meta-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .lightbox-controls,
        .lightbox-details .lb-meta {
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin: 0;
            backdrop-filter: blur(8px);
        }

        .btn-download {
            background: var(--primary);
            color: #1a1a1a;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-family: inherit;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            width: 100%;
            margin-top: 20px;
        }

        .btn-download:hover {
            background: #ffc400;
            box-shadow: 0 8px 24px rgba(238, 182, 0, 0.4);
            transform: translateY(-2px);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 5;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-50%) scale(1.1);
        }

        .nav-btn.prev {
            left: 20px;
        }

        .nav-btn.next {
            right: 20px;
        }

        /* ===== Responsive ===== */
        @media (min-width: 1600px) {
            .gallery-grid {
                column-count: 7;
            }
        }

        @media (max-width: 1200px) {
            .gallery-grid {
                column-count: 4;
                column-gap: 8px;
            }
        }

        @media (max-width: 768px) {
            .app-bar {
                height: 48px;
            }

            .app-title {
                font-size: 15px;
            }

            .gallery-grid {
                column-count: 3;
                column-gap: 6px;
            }

            .photo-card {
                margin-bottom: 6px;
                border-radius: var(--radius-sm);
            }

            .photo-info {
                padding: 6px 8px;
            }

            .photo-info h3 {
                font-size: 11px;
            }

            .photo-info p {
                font-size: 9px;
            }

            .photo-badge {
                font-size: 8px;
                padding: 1px 6px;
                top: 5px;
                left: 5px;
            }

            .lightbox-content {
                flex-direction: column;
                height: 100%;
                width: 100%;
                max-height: 100vh;
                max-width: 100vw;
                border-radius: 0;
                position: fixed;
                inset: 0;
                background: transparent;
                border: none;
            }

            .lightbox-image-wrapper {
                position: absolute;
                inset: 0;
                height: 100vh;
                width: 100vw;
                background: transparent;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1;
                transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            }

            .lightbox-image-wrapper img {
                height: 100%;
                max-height: 100%;
                width: 100%;
                object-fit: contain;
                filter: none;
            }

            .lightbox-details {
                position: absolute;
                bottom: 0;
                left: 0;
                width: 100%;
                height: auto;
                max-height: 70vh;
                padding: 24px 20px calc(56px + env(safe-area-inset-bottom, 20px)) 20px;
                background: rgba(20, 20, 20, 0.85);
                backdrop-filter: blur(24px);
                -webkit-backdrop-filter: blur(24px);
                border-top-left-radius: 28px;
                border-top-right-radius: 28px;
                display: flex;
                flex-direction: column;
                z-index: 10;
                transform: translateY(calc(100% - var(--reveal-height, 115px)));
                transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
                touch-action: pan-y;
                cursor: pointer;
                border: 1px solid rgba(255, 255, 255, 0.08);
                border-bottom: none;
            }

            .lightbox-details::before {
                content: '';
                display: block;
                width: 44px;
                height: 5px;
                background: rgba(255, 255, 255, 0.3);
                border-radius: 3px;
                margin: 0 auto 16px auto;
                flex-shrink: 0;
            }

            .lightbox-details.expanded {
                transform: translateY(0);
                cursor: default;
            }

            .lightbox-details h2 {
                margin-bottom: 4px;
                margin-top: 0;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                font-size: 18px;
            }

            .lightbox-details .lb-desc {
                margin: 0;
                white-space: normal;
                overflow: visible;
                font-size: 14px;
                opacity: 0;
                transition: opacity 0.3s;
            }

            .lightbox-details.expanded .lb-desc {
                opacity: 1;
                margin-bottom: 16px;
            }

            .lightbox-meta-row {
                margin-top: 8px;
                margin-bottom: 4px;
                gap: 8px;
            }

            .lightbox-controls,
            .lightbox-details .lb-meta {
                font-size: 11px;
                padding: 5px 12px;
            }

            .nav-btn {
                top: auto;
                bottom: 24px;
                transform: none;
                background: rgba(255, 255, 255, 0.15);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                border: 1px solid rgba(255, 255, 255, 0.2);
                color: #fff;
                width: 48px;
                height: 48px;
                z-index: 2005;
            }

            .nav-btn:hover {
                transform: none;
                background: rgba(255, 255, 255, 0.25);
            }

            .nav-btn.prev {
                left: 24px;
            }

            .nav-btn.next {
                right: 24px;
            }

            .close-btn {
                top: 20px;
                right: 20px;
                width: 40px;
                height: 40px;
                background: rgba(0, 0, 0, 0.3);
                border: none;
            }

            .btn-download {
                position: absolute;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                width: 44px;
                height: 44px;
                border-radius: 50%;
                padding: 0;
                font-size: 0;
                z-index: 2006;
                box-shadow: 0 4px 16px rgba(238, 182, 0, 0.4);
                background: var(--primary);
                color: #000;
                margin: 0;
                border: none;
            }

            .btn-download .material-icons {
                margin: 0;
                font-size: 20px;
            }

            .btn-download:hover {
                transform: translateX(-50%) translateY(-2px);
            }

            /* UI Hidden states */
            .lightbox-overlay.ui-hidden .lightbox-details {
                transform: translateY(100%) !important;
            }

            .lightbox-overlay.ui-hidden .close-btn,

        // ============================================
        // SUPABASE REST CLIENT (no SDK needed)
        // ============================================
        async function supabaseGet(tableName) {
            const url = `${SUPABASE_URL}/rest/v1/${tableName}?select=image_iid,title,description,image_url,thumbnail_url,section,created_at&order=image_iid.asc`;

        // ============================================
        // URL SANITIZER
        // ============================================
        function sanitize(url) {
            if (!url || typeof url !== 'string') return '';
            url = url.split('#')[0].trim();
            url = url.replace(/i\.ibb\.co\.com/g, 'i.ibb.co');
            url = url.replace(/\.com\.com/g, '.com');
            url = url.replace(/([^:]\/)\/+/g, '$1');
            if (url.startsWith('//')) url = 'https:' + url;
            else if (url.startsWith('http://')) url = url.replace('http://', 'https://');
            return url;
        }

        // ============================================
        // DATA LOADING — ALL 15 TABLES
        // ============================================
        async function loadAllPhotos() {
            if (State.cache.data && State.cache.ts && Date.now() - State.cache.ts < State.CACHE_TTL) {
                console.log('📦 Using cached data');
                return State.cache.data;

            State.isLoading = true;
            showSkeletons();
            document.getElementById('loadingIndicator').classList.add('visible');

            try {

                const resp = await fetch(url, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    }

                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

                const all = [];

                    State.tableStats[section] = (State.tableStats[section] || 0) + 1;

                    all.push({

                        description: item.description || '',
                        image_url: imageUrl,

                        tableName: 'kabirdatabase',
                        section: section,

                console.log(`✅ Loaded ${all.length} photos from kabirdatabase`);

            } catch (err) {
                console.error('❌ Load error:', err);
                return [];
            } finally {
                State.isLoading = false;
                document.getElementById('loadingIndicator').classList.remove('visible');
            }
        }

        // ============================================
        // ADVANCED MIXING ALGORITHM SYSTEM
        // ============================================

        // ── 1. Core Utility ──────────────────────────────────────

        /** Fisher-Yates O(n) shuffle */
        function fisherShuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        // ── 2. User Preference Tracking (localStorage) ───────────

        const Prefs = {
            KEY: 'gd_prefs_v1',
            data: { catClicks: {}, tableClicks: {} },

            load() {
                try {
                    const raw = localStorage.getItem(this.KEY);
                    if (raw) this.data = JSON.parse(raw);
                } catch (_) { }
            },

            save() {
                try { localStorage.setItem(this.KEY, JSON.stringify(this.data)); } catch (_) { }
            },

            record(tableName, category) {
                this.data.tableClicks[tableName] = (this.data.tableClicks[tableName] || 0) + 1;
                this.data.catClicks[category] = (this.data.catClicks[category] || 0) + 1;
                this.save();
            },

            tableWeight(tn) {
                const c = this.data.tableClicks[tn] || 0;
                if (c === 0) return 1;
                if (c < 5) return 1.3;
                if (c < 15) return 1.8;
                if (c < 40) return 2.5;
                return 4;
            },

            catWeight(cat) {
                const c = this.data.catClicks[cat] || 0;
                if (c === 0) return 1;
                if (c < 10) return 1.4;
                if (c < 30) return 2;
                return 3;
            }
        };
        Prefs.load();

        // ── 3. Photo Scoring ──────────────────────────────────────

        const _NOW = Date.now();
        const _WEEK_MS = 7 * 86400000;
        const _MONTH_MS = 30 * 86400000;
        const _Q3MO_MS = 90 * 86400000;

        /**
         * প্রতিটি ছবিকে score দেওয়া হয়:
         *   Recency   : নতুন ছবি সামনে আসে (+0–+40)
         *   Quality   : title/description থাকলে বোনাস (+0–+20)
         *   Preference: ইউজার যা বেশি দেখে (+0–+40)
         *   Noise     : প্রতিবার ভিন্ন মিশ্রণ (+0–+30)
         */
        function scorePhoto(p) {
            let recency = 0;
            if (p.created_at) {
                const age = _NOW - new Date(p.created_at).getTime();
                if (age < _WEEK_MS) recency = 40;
                else if (age < _MONTH_MS) recency = 25;
                else if (age < _Q3MO_MS) recency = 10;
            }
            const quality = (p.title ? 12 : 0) + (p.description ? 8 : 0);
            const pref = Prefs.tableWeight(p.tableName) * 8 + Prefs.catWeight(p.category) * 5;
            const noise = Math.random() * 30;
            return recency + quality + pref + noise;
        }

        // ── 4. Diversity Pass ─────────────────────────────────────

        /**
         * যদি maxRun বা তার বেশি পরপর ছবি একই key (category / tableName)
         * থেকে আসে, সামনের ভিন্ন key-এর ছবির সাথে swap করে diversity রাখে।
         */
        function diversityPass(arr, key = 'category', maxRun = 3) {
            const a = [...arr];
            for (let i = maxRun; i < a.length; i++) {
                const run = a.slice(i - maxRun, i).every(x => x[key] === a[i - maxRun][key]);
                if (!run || a[i][key] !== a[i - maxRun][key]) continue;
                let swapIdx = -1;
                for (let j = i + 1; j < Math.min(i + 20, a.length); j++) {
                    if (a[j][key] !== a[i][key]) { swapIdx = j; break; }
                }
                if (swapIdx !== -1) [a[i], a[swapIdx]] = [a[swapIdx], a[i]];
            }
            return a;
        }

        // ── 5. Table-Level Scored Mix ─────────────────────────────

        /**
         * প্রতিটি টেবিলের ছবি score অনুযায়ী sort করে,
         * তারপর user preference weighted round-robin interleave।
         */
        function scoredTableMix(photos) {
            const tables = {};
            photos.forEach(p => {
                if (!tables[p.tableName]) tables[p.tableName] = [];
                tables[p.tableName].push(p);
            });

            for (const tn of Object.keys(tables)) {
                tables[tn] = tables[tn]
                    .map(p => ({ p, s: scorePhoto(p) }))
                    .sort((a, b) => b.s - a.s)
                    .map(x => x.p);
            }

            const tableNames = Object.keys(tables);
            const weightedPool = fisherShuffle(
                tableNames.flatMap(tn => Array(Math.max(1, Math.round(Prefs.tableWeight(tn)))).fill(tn))
            );

            const idx = {};
            tableNames.forEach(tn => idx[tn] = 0);
            const result = [];
            const total = photos.length;
            let placed = 0, cycle = 0;

            while (placed < total) {
                const order = cycle === 0 ? weightedPool : fisherShuffle([...tableNames]);
                let added = 0;
                for (const tn of order) {
                    if (idx[tn] < tables[tn].length) {
                        result.push(tables[tn][idx[tn]++]);
                        placed++; added++;
                        if (placed >= total) break;
                    }
                }
                if (added === 0) break;
                cycle++;
            }
            return result;
        }

        // ── 6. Smart Global Mix — main algorithm ──────────────────

        /**
         * সর্বোত্তম অ্যালগরিদম — সব টেবিল এবং সব ক্যাটাগরির জন্য
         *
         *  1. category অনুযায়ী ভাগ → প্রতিটিতে scoredTableMix
         *  2. category preference weighted round-robin
         *  3. category diversity pass (max 3 পরপর একই category)
         *  4. table diversity pass (max 4 পরপর একই table)
         */
        function smartGlobalMix(photos) {
            const categories = {};
            photos.forEach(p => {
                if (!categories[p.category]) categories[p.category] = [];
                categories[p.category].push(p);
            });

            const catMixed = {};
            for (const cat of Object.keys(categories)) {
                catMixed[cat] = scoredTableMix(categories[cat]);
            }

            const catNames = Object.keys(catMixed);
            const catPool = fisherShuffle(
                catNames.flatMap(cn => Array(Math.max(1, Math.round(Prefs.catWeight(cn)))).fill(cn))
            );
            const catIdx = {};
            catNames.forEach(cn => catIdx[cn] = 0);

            const result = [];
            const total = photos.length;
            let placed = 0, cycle = 0;

            while (placed < total) {
                const order = cycle === 0 ? catPool : fisherShuffle([...catNames]);
                let added = 0;
                for (const cn of order) {
                    if (catIdx[cn] < catMixed[cn].length) {
                        result.push(catMixed[cn][catIdx[cn]++]);
                        placed++; added++;
                        if (placed >= total) break;
                    }
                }
                if (added === 0) break;
                cycle++;
            }

            let out = diversityPass(result, 'category', 3);
            out = diversityPass(out, 'tableName', 4);
            console.log(`🌟 smartGlobalMix: ${photos.length} photos, ${catNames.length} categories`);
            return out;
        }

        // ============================================

        function normalizeSection(section) {
            if (!section || section === 'all') return 'all';
            return section === 'other' ? 'others' : section;

        function applyFilters() {
            State.currentPage = 1;

            const selectedCategory = State.currentCategory;
            const selectedSection = normalizeSection(State.currentSection);

            let photos = [...State.allPhotos];

            if (selectedCategory !== 'all') {
                photos = photos.filter(p => p.category === selectedCategory);
            }

            if (selectedSection !== 'all') {
                photos = photos.filter(p => normalizeSection(p.section || 'others') === selectedSection);
            }

            State.filteredPhotos = photos;

            const useGlobalMix = selectedCategory === 'all' && selectedSection === 'all';
            State.mixedPhotos = useGlobalMix
                ? smartGlobalMix(State.filteredPhotos)
                : smartCategoryMix(State.filteredPhotos);

            renderGallery();
            updateUI();
        }

            State.currentCategory = category;

        // ============================================
        // PROGRESSIVE IMAGE LOADING (IntersectionObserver)
        // ============================================
        const imageObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;
                const img = entry.target;
                if (!img.dataset.src || !img.src.includes('data:image')) return;

                const thumbSrc = img.dataset.thumbnail;
                const gallerySrc = img.dataset.gallery;

                // Step 1: Load thumbnail (fast, small)
                loadImgWithRetry(thumbSrc).then(() => {
                    requestAnimationFrame(() => {
                        img.src = thumbSrc;
                        img.style.opacity = '1';

                        // Step 2: If gallery-quality is different, upgrade
                        if (gallerySrc && gallerySrc !== thumbSrc) {
                            img.style.filter = 'blur(2px)';
                            loadImgWithRetry(gallerySrc).then(() => {
                                requestAnimationFrame(() => {
                                    img.src = gallerySrc;
                                    img.style.filter = 'none';
                                    img.classList.add('loaded');
                                });
                            }).catch(() => {
                                img.style.filter = 'none';
                                img.classList.add('loaded');
                            });
                        } else {
                            img.style.filter = 'none';
                            img.classList.add('loaded');
                        }
                    });
                    observer.unobserve(img);
                }).catch(() => {
                    // Fallback: try original URL directly
                    img.src = img.dataset.src;
                    img.style.opacity = '1';
                    img.style.filter = 'none';
                    img.classList.add('loaded');
                    observer.unobserve(img);
                });
            });
        }, { rootMargin: '400px', threshold: 0.01 });

        /** Load image with retry (exponential backoff) */
        function loadImgWithRetry(src, maxRetries = 2) {
            return new Promise((resolve, reject) => {
                let attempts = 0;
                const tryLoad = () => {
                    const i = new Image();
                    i.onload = () => resolve(i);
                    i.onerror = () => {
                        if (++attempts <= maxRetries) {
                            setTimeout(tryLoad, 800 * attempts);
                        } else {
                            reject(new Error('Image load failed'));
                        }
                    };
                    i.src = src;
                };
                tryLoad();
            });
        }

        if (lightboxDetails) {
            let sheetStartY = 0;
            let sheetCurrentY = 0;
            let isDraggingSheet = false;

            lightboxDetails.addEventListener('touchstart', function (e) {
                if (!Img.isMobile()) return;
                sheetStartY = e.touches[0].clientY;
                isDraggingSheet = true;
                this.style.transition = 'none';
                e.stopPropagation();
            }, { passive: true });

            lightboxDetails.addEventListener('touchmove', function (e) {
                if (!isDraggingSheet) return;
                sheetCurrentY = e.touches[0].clientY;
                const deltaY = sheetCurrentY - sheetStartY;

                if (this.classList.contains('expanded')) {
                    if (deltaY > 0) this.style.transform = `translateY(${deltaY}px)`;
                } else {
                    if (deltaY < 0) {
                        const reveal = parseInt(getComputedStyle(this).getPropertyValue('--reveal-height')) || 115;
                        const maxUp = this.offsetHeight - reveal;
                        const move = Math.min(-deltaY, maxUp);
                        this.style.transform = `translateY(calc(100% - var(--reveal-height, 115px) - ${move}px))`;
                    }
                }
                e.stopPropagation();
            }, { passive: true });

            lightboxDetails.addEventListener('touchend', function (e) {
                if (!isDraggingSheet) return;
                isDraggingSheet = false;
                this.style.transition = '';

                if (sheetCurrentY === 0) return;
                const deltaY = sheetCurrentY - sheetStartY;
                if (Math.abs(deltaY) > 30) {
                    if (this.classList.contains('expanded') && deltaY > 0) {
                        this.classList.remove('expanded');
                    } else if (!this.classList.contains('expanded') && deltaY < 0) {
                        this.classList.add('expanded');
                    }
                }
                this.style.transform = '';
                sheetCurrentY = 0;
                e.stopPropagation();
            }, { passive: true });

                if (Img.isMobile() && !this.classList.contains('expanded')) {

        // ============================================
        // DOWNLOAD (with blob fallback)
        // ============================================
        async function downloadImage() {
            const img = document.getElementById('lightboxImage');
            const url = img.getAttribute('data-original-url') || img.src;
            const title = document.getElementById('lightboxTitle').textContent || 'kobir_lyrics';
            if (!url) { alert('ছবি পাওয়া যায়নি'); return; }

            const btn = document.querySelector('.btn-download');
            const origHTML = btn.innerHTML;
            try {
                btn.innerHTML = '<span class="material-icons" style="animation:spin 1s linear infinite;">sync</span>';
                btn.disabled = true;

                const resp = await fetch(url);
                if (!resp.ok) throw new Error('Fetch failed');
                const blob = await resp.blob();

                let fname = title.replace(/[^a-z0-9\u0980-\u09FF]/gi, '_').substring(0, 50);
                const ext = blob.type === 'image/png' ? '.png' : blob.type === 'image/webp' ? '.webp' : '.jpg';
                fname += ext;

                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = fname;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(a.href), 500);

                btn.innerHTML = '<span class="material-icons">check_circle</span> Done';
                setTimeout(() => { btn.innerHTML = origHTML; btn.disabled = false; }, 2000);
            } catch (e) {
                console.error('Download failed:', e);
                btn.innerHTML = origHTML;
                btn.disabled = false;
                window.open(url, '_blank');
            }
        }

            return text.replace(/[&<>"']/g, m => map[m]);

        const SITE_VIEW_IID = 106639;

        // ── 1. Site Stats Processing (Atomic Increment via RPC) ──
        async function processSiteStats(currentSessionImages) {
            const bar = document.getElementById('siteViewBar');
            const countEl = document.getElementById('siteViewCount');
            if (!bar || !countEl) return;

            try {
                // We use RPC for atomic increment to avoid race conditions (Safe for 10+ concurrent users)
                const url = `${SUPABASE_URL}/rest/v1/rpc/increment_site_view`;
                const resp = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        row_id: SITE_VIEW_IID,
                        inc_val: currentSessionImages
                    })
                });

                if (!resp.ok) throw new Error(`RPC Failed: ${resp.status}`);

                // The RPC returns the NEW total from the RETURNING clause
                const newTotal = await resp.json();

                if (newTotal !== null && newTotal !== undefined) {
                    countEl.textContent = parseInt(newTotal).toLocaleString('bn-BD');
                    bar.style.display = 'flex';
                    console.log(`✅ Site views updated to: ${newTotal}`);
                }
            } catch (err) {
                console.warn('⚠️ site_view update error:', err.message);
                // On error, show current session count at least
                countEl.textContent = currentSessionImages.toLocaleString('bn-BD');
                bar.style.display = 'flex';
            }
        }

        // ============================================
        // SCROLL BEHAVIOR: hide header + show footer at bottom
        // ============================================
        (function () {
            const appBar = document.querySelector('.app-bar');
            const bottomBar = document.querySelector('.bottom-bar');
            let lastScrollY = 0;
            let ticking = false;

            function onScroll() {
                const currentY = window.scrollY;
                const docHeight = document.documentElement.scrollHeight;
                const winHeight = window.innerHeight;
                const distanceToBottom = docHeight - (currentY + winHeight);

                // Header: hide on scroll down, show on scroll up
                if (currentY > lastScrollY && currentY > 80) {
                    appBar.classList.add('hidden');
                } else {
                    appBar.classList.remove('hidden');
                }

                // Bottom Bar: Show only when near the bottom (within 150px)
                if (distanceToBottom < 150) {
                    bottomBar.classList.add('visible');
                    bottomBar.style.transform = 'translateY(0)';
                    bottomBar.style.opacity = '1';
                } else {
                    bottomBar.classList.remove('visible');
                    bottomBar.style.transform = 'translateY(100%)';
                    bottomBar.style.opacity = '0';
                }

                lastScrollY = currentY;
                ticking = false;
            }

            window.addEventListener('scroll', () => {
                if (!ticking) {
                    requestAnimationFrame(onScroll);
                    ticking = true;
                }
            }, { passive: true });
            
            // Initial call to ensure visibility
            onScroll();
        })();
    </script>
</body>

</html>
