<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline • Gopals Diary</title>
  <meta name="theme-color" content="#ff99cc" />
  <style>
    :root { --primary:#ff99cc; --text:#262626; --muted:#777; --bg:#fafafa; }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; background:var(--bg); color:var(--text); display:flex; align-items:center; justify-content:center; padding:24px}
    .card{width:100%; max-width:560px; background:#fff; border:1px solid #eaeaea; border-radius:12px; box-shadow:0 6px 24px rgba(0,0,0,.08); padding:28px; text-align:center}
    .icon{font-size:56px; line-height:1;}
    h1{margin:10px 0 8px; font-size:22px}
    p{margin:0 0 16px; color:var(--muted); line-height:1.6}
    .tips{background:#fff3f9; border:1px dashed var(--primary); color:#555; border-radius:10px; padding:12px; text-align:left; font-size:14px}
    .btns{margin-top:18px; display:flex; gap:12px; flex-wrap:wrap; justify-content:center}
    .btn{appearance:none; border:none; background:linear-gradient(135deg, #ff99cc 0%, #ffb3d9 100%); color:#fff; font-weight:700; padding:12px 18px; border-radius:10px; cursor:pointer; box-shadow:0 4px 14px rgba(255,153,204,.35)}
    .btn.secondary{background:#fff; color:#333; border:1px solid #ddd}
    .status{margin-top:14px; font-size:13px; padding:8px 14px; border-radius:8px; display:none}
    .status.online{background:#ecfdf5; color:#065f46; border:1px solid #a7f3d0; display:block}
    small{display:block; margin-top:10px; color:#aaa}
  </style>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <main class="card" role="main">
    <div class="icon" aria-hidden="true">📡</div>
    <h1>আপনি এখন অফলাইন</h1>
    <p>ইন্টারনেট সংযোগ নেই বলে এই পেজটি দেখানো হচ্ছে। সংযোগ ফিরে এলে স্বয়ংক্রিয়ভাবে হোমে ফিরে যাবেন।</p>
    <div class="tips">
      <strong>টিপস:</strong>
      <ul style="margin:8px 0 0 18px">
        <li>Wi‑Fi/মোবাইল ডেটা অন আছে কি না দেখুন</li>
        <li>পেজটি রিলোড করে দেখুন</li>
        <li>অ্যাপ হিসেবে ইনস্টল করলে কিছু কনটেন্ট অফলাইনে কাজ করবে</li>
      </ul>
    </div>
    <div class="btns">
      <button class="btn" onclick="location.reload()">🔄 Reload</button>
      <button class="btn secondary" id="homeBtn">🏠 Home</button>
    </div>
    <div id="onlineStatus" class="status online" role="status" aria-live="polite" style="display:none">
      ✅ সংযোগ ফিরে এসেছে! হোমে ফিরে যাচ্ছি…
    </div>
    <small>Gopals Diary</small>
  </main>

  <script>
    // Go to home (previous page or default home)
    document.getElementById('homeBtn').addEventListener('click', function () {
      const ref = document.referrer;
      if (ref && !ref.includes('offline.html')) {
        window.location.href = ref;
      } else {
        window.location.href = './home.html';
      }
    });

    // Auto-redirect when back online
    function handleOnline() {
      const statusEl = document.getElementById('onlineStatus');
      statusEl.style.display = 'block';
      setTimeout(function () {
        const ref = document.referrer;
        window.location.href = (ref && !ref.includes('offline.html')) ? ref : './home.html';
      }, 1500);
    }

    window.addEventListener('online', handleOnline);

    // If already online (e.g. refreshed manually), redirect immediately
    if (navigator.onLine) {
      handleOnline();
    }
  </script>
</body>
</html>
