<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	
	<!-- SEO Meta Tags -->
	<title>Kobir Lyrics</title>
	<meta name="description" content="Kobir Lyrics - আপনার পছন্দের বাংলা কোটস, ফটোগ্রাফি, ডটেড ইলাস্ট্রেশন, ইলাস্ট্রেশন এবং ইংলিশ কোটস। Free to use and download beautiful aesthetic content.">

	<!-- Google Fonts -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

	<!-- PWA Manifest and Meta Tags -->
	<link rel="manifest" href="manifest.json">
	<link rel="icon" type="image/x-icon" href="favicon.ico">
	<link rel="apple-touch-icon" href="app_logo.png">
	<meta name="theme-color" content="#fafafa">
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

	<style>
		:root {
			--primary: #0095f6;
			--primary-dark: #0077dd;
			--accent: #ff007a;
			--glass: rgba(255, 255, 255, 0.75);
			--border: rgba(0, 0, 0, 0.08);
			--shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: 'Inter', -apple-system, sans-serif;
			background: #fdfdff;
			background-image: 
				radial-gradient(circle at 10% 20%, rgba(0, 149, 246, 0.05) 0%, transparent 40%),
				radial-gradient(circle at 90% 80%, rgba(255, 0, 122, 0.05) 0%, transparent 40%);
			color: #1a1a1a;
			min-height: 100vh;
			overflow-x: hidden;
		}

		header {
			background: rgba(255, 255, 255, 0.82);
			backdrop-filter: blur(20px);
			-webkit-backdrop-filter: blur(20px);
			padding: 0.8rem 1.5rem;
			position: sticky;
			top: 0;
			z-index: 1000;
			border-bottom: 1px solid var(--border);
		}

		.nav-content {
			max-width: 1200px;
			margin: 0 auto;
			display: flex;
			justify-content: space-between;
			align-items: center;
		}

		.site-brand {
			font-size: 1.5rem;
			font-weight: 800;
			background: linear-gradient(135deg, var(--primary), var(--accent));
			-webkit-background-clip: text;
			background-clip: text;
			-webkit-text-fill-color: transparent;
			text-decoration: none;
			letter-spacing: -1px;
		}

		.login-btn {
			padding: 8px 20px;
			border-radius: 50px;
			border: 1px solid var(--border);
			background: #fff;
			color: #444;
			text-decoration: none;
			font-weight: 600;
			font-size: 0.9rem;
			transition: all 0.3s;
		}

		.login-btn:hover {
			background: #f8f9fa;
			transform: scale(1.05);
			box-shadow: 0 4px 10px rgba(0,0,0,0.05);
		}

		main {
			max-width: 1200px;
			margin: 3rem auto;
			padding: 0 1.5rem;
		}

		.hero-section {
			text-align: center;
			margin-bottom: 4rem;
		}

		.hero-section h1 {
			font-size: 2.8rem;
			font-weight: 850;
			margin-bottom: 1rem;
			letter-spacing: -2px;
			color: #000;
		}

		.hero-section p {
			color: #666;
			font-size: 1.1rem;
			max-width: 600px;
			margin: 0 auto;
		}

		.group-title {
			font-size: 1.25rem;
			font-weight: 700;
			margin: 3rem 0 1.5rem;
			display: flex;
			align-items: center;
			gap: 12px;
		}

		.group-title span {
			font-size: 1.5rem;
		}

		.creations-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
			gap: 2rem;
		}

		.cat-card {
			background: var(--glass);
			border: 1px solid rgba(255, 255, 255, 0.4);
			border-radius: 32px;
			padding: 2rem;
			box-shadow: var(--shadow);
			backdrop-filter: blur(10px);
			transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
		}

		.cat-card:hover {
			transform: translateY(-8px);
			box-shadow: 0 20px 45px rgba(0, 0, 0, 0.12);
			border-color: rgba(0, 149, 246, 0.2);
		}

		.cat-header {
			display: flex;
			align-items: center;
			gap: 18px;
			margin-bottom: 2rem;
		}

		.cat-icon {
			width: 64px;
			height: 64px;
			border-radius: 20px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 2rem;
			box-shadow: inset 0 0 0 1px rgba(255,255,255,0.5);
		}

		.cat-icon.blue { background: linear-gradient(135deg, #e3f2fd, #bbdefb); color: #1565c0; }
		.cat-icon.pink { background: linear-gradient(135deg, #fce4ec, #f8bbd0); color: #c2185b; }
		.cat-icon.orange { background: linear-gradient(135deg, #fff3e0, #ffe0b2); color: #e65100; }
		.cat-icon.green { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); color: #2e7d32; }
		.cat-icon.purple { background: linear-gradient(135deg, #f3e5f5, #e1bee7); color: #7b1fa2; }

		.cat-header h4 {
			font-size: 1.3rem;
			font-weight: 800;
		}

		.cat-links {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 12px;
		}

		.cat-link {
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 18px;
			background: rgba(0, 0, 0, 0.03);
			border-radius: 18px;
			text-decoration: none;
			color: #333;
			font-weight: 700;
			font-size: 0.95rem;
			transition: all 0.25s;
			border: 1px solid transparent;
		}

		.cat-link:hover {
			background: #fff;
			color: var(--primary);
			transform: scale(1.05);
			box-shadow: 0 4px 15px rgba(0,0,0,0.05);
			border-color: rgba(0, 149, 246, 0.1);
		}

		.cat-link.full {
			grid-column: span 2;
		}

		/* Install Button */
		.install-bar {
			margin-top: 6rem;
			text-align: center;
		}

		#installBtn {
			background: #000;
			color: #fff;
			padding: 1.2rem 3rem;
			border-radius: 20px;
			font-weight: 800;
			border: none;
			cursor: pointer;
			font-size: 1.1rem;
			box-shadow: 0 10px 20px rgba(0,0,0,0.1);
			display: none;
			transition: transform 0.3s;
		}

		#installBtn:hover {
			transform: scale(1.05);
		}

		@media (max-width: 768px) {
			header { padding: 0.6rem 1rem; }
			.site-brand { font-size: 1.2rem; }
			.login-btn { padding: 6px 14px; font-size: 0.8rem; }
			main { margin: 2rem auto; padding: 0 1rem; }
			.hero-section { margin-bottom: 2.5rem; }
			.hero-section h1 { font-size: 2rem; margin-bottom: 0.5rem; }
			.hero-section p { font-size: 0.95rem; padding: 0 10px; }
			
			.group-title { font-size: 1.1rem; margin: 2rem 0 1rem; gap: 8px; }
			.group-title span { font-size: 1.2rem; }
			
			.creations-grid { grid-template-columns: 1fr; gap: 1rem; }
			.cat-card { padding: 1.2rem; border-radius: 20px; }
			.cat-header { gap: 12px; margin-bottom: 1.2rem; }
			.cat-icon { width: 44px; height: 44px; font-size: 1.4rem; border-radius: 12px; }
			.cat-header h4 { font-size: 1.1rem; }
			
			.cat-links { grid-template-columns: 1fr 1fr; gap: 8px; }
			.cat-link { padding: 10px; font-size: 0.85rem; border-radius: 12px; }
			
			.install-bar { margin-top: 2rem; }
			#installBtn, #pinterestBtn { 
				padding: 1rem 2rem !important; 
				font-size: 0.95rem !important; 
				border-radius: 15px !important;
				width: 100%;
				max-width: 250px;
			}
		}

		/* ===== PWA Install Promo ===== */
        .install-prompt {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: calc(100% - 32px);
            max-width: 340px;
            background: #fff;
            color: #000;
            padding: 16px;
            border-radius: 20px;
            box-shadow: 0 12px 48px rgba(0,0,0,0.25);
            display: none;
            z-index: 9999;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.6s;
            opacity: 0;
            border: 1px solid rgba(0,0,0,0.05);
            text-align: left;
        }
        .install-prompt.visible { display: block; transform: translateX(-50%) translateY(0); opacity: 1; }
        .install-content {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            position: relative;
            padding-right: 28px;
        }
        .install-app-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            object-fit: cover;
        }
        .install-text h3 { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
        .install-text p { font-size: 11px; color: #666; line-height: 1.3; }
        .btn-install-now {
            width: 100%;
            background: #e6b000;
            color: #000;
            border: none;
            padding: 10px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-install-now:active { background: #d4a200; }
        .btn-close-install {
            position: absolute;
            top: -4px;
            right: -4px;
            background: transparent;
            border: none;
            color: #999;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-close-install:hover { color: #333; }
	</style>
</head>
<body>

	<header>
		<div class="nav-content">
			<a href="index.html" class="site-brand">Kobir Lyrics</a>
			<a href="admin/login.html" class="login-btn">Admin Login</a>
		</div>
	</header>

	<main>
		<section class="hero-section">
			<h1>Explore & Create.</h1>
			<p>Beautiful aesthetic content for your social media. Bengali quotes, digital art, photography, and deep stories.</p>
		</section>

		<div id="dynamicContent">
			<!-- Dynamic Groups and Cards will be injected here -->
			<div style="text-align: center; padding: 40px; color: #888;">
				<div class="circular-progress" style="margin: 0 auto;"></div>
				<p style="margin-top: 15px;">Discovering collections...</p>
			</div>
		</div>

		<div class="install-bar">
			<button id="installBtn">📲 Download App</button>
		</div>
		<div class="install-bar">
			<a href="pinterest.html" style="text-decoration: none;">
				<button id="pinterestBtn" style="display: inline-block; background: #e60023; color: #fff; padding: 1.2rem 3rem; border-radius: 20px; font-weight: 800; border: none; cursor: pointer; font-size: 1.1rem; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: transform 0.3s;">📌 Pinterest Gallery</button>
			</a>
		</div>
		<div class="install-bar">
			<a href="../index.html" style="text-decoration: none;">
				<button id="pinterestBtn" style="display: inline-block; background: #e6b000; color: #fff; padding: 1.2rem 3rem; border-radius: 20px; font-weight: 800; border: none; cursor: pointer; font-size: 1.1rem; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: transform 0.3s;">Home</button>
			</a>
		</div>

	</main>

    <!-- ===== PWA Install Prompt ===== -->
    <div id="installPrompt" class="install-prompt">
        <div class="install-content">
            <button class="btn-close-install" id="btnCancelInstall" aria-label="Close">
                <span class="material-icons" style="font-size: 18px; font-family: 'Inter';">×</span>
            </button>
            <img src="app_logo.png" class="install-app-icon" alt="App Logo">
            <div class="install-text">
                <h3>কবির লিরিক্স অ্যাপ</h3>
                <p>সবচেয়ে ভালো অভিজ্ঞতার জন্য অ্যাপটি ইনস্টল করুন!</p>
            </div>
        </div>
        <button class="btn-install-now" id="btnInstallNowPopup">ইনস্টল করুন</button>
    </div>

	<script>
		// ============================================
		// CONFIGURATION
		// ============================================
		const SUPABASE_URL = 'https://vbfckjroisrhplrpqzkd.supabase.co';
		const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZiZmNranJvaXNyaHBscnBxemtkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE4NDQzODYsImV4cCI6MjA3NzQyMDM4Nn0.nIbdwysoW2dp59eqPh3M9axjxR74rGDkn8OdZciue4Y';

		// Metadata for pretty display
		const CATEGORY_META = {
			'bangla': { title: 'Bengali Creations', icon: '✨', class: 'green', emoji: '✍️' },
			'art':    { title: 'Art & Styling',    icon: '🎨', class: 'pink',  emoji: '🎨' },
			'story':  { title: 'Stories & Global', icon: '🌍', class: 'orange', emoji: '📖' },
			'global': { title: 'International',    icon: '💫', class: 'blue',   emoji: '🌍' },
			'misc':   { title: 'Miscellaneous',    icon: '✨', class: 'purple', emoji: '💫' }
		};

		const SECTION_NAMES = {
			'bangla_quotes_1': 'Quotes I', 'bangla_quotes_2': 'Quotes II', 'bangla_quotes_3': 'Quotes III', 'bangla_quotes_4': 'Quotes IV',
			'photography_1': 'Photos I', 'photography_2': 'Photos II', 'photography_3': 'Photos III', 
			'illustration_1': 'Illust. I', 'illustration_2': 'Illust. II',
			'story_1': 'Part I', 'story_2': 'Part II', 'story_3': 'Part III',
			'english_quote_1': 'English I', 'english_quote_2': 'English II',
			'others': 'Special'
		};

		function getGroup(sectionId) {
			if (sectionId.startsWith('bangla')) return 'bangla';
			if (sectionId.startsWith('photo') || sectionId.startsWith('illust')) return 'art';
			if (sectionId.startsWith('story') || sectionId === 'others') return 'story';
			if (sectionId.startsWith('english')) return 'global';
			return 'misc';
		}

		function humanize(id) {
			return SECTION_NAMES[id] || id.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
		}

		// ============================================
		// DYNAMIC DATA LOADING
		// ============================================
		async function initDynamicHome() {
			const container = document.getElementById('dynamicContent');
			
			try {
				// Fetch unique sections from database
				const response = await fetch(`${SUPABASE_URL}/rest/v1/kabirdatabase?select=section`, {
					headers: {
						'apikey': SUPABASE_ANON_KEY,
						'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
					}
				});
				
				const data = await response.json();
				if (!data || data.length === 0) {
					container.innerHTML = '<p style="text-align:center; color:#888;">No collections found yet.</p>';
					return;
				}

				// Get unique sections and sort them
				const uniqueSections = [...new Set(data.map(item => item.section).filter(Boolean))].sort();
				
				// Group sections
				const groups = {};
				uniqueSections.forEach(sec => {
					const groupId = getGroup(sec);
					if (!groups[groupId]) groups[groupId] = [];
					groups[groupId].push(sec);
				});

				// Render
				container.innerHTML = '';
				
				Object.keys(groups).forEach(groupId => {
					const meta = CATEGORY_META[groupId] || CATEGORY_META['misc'];
					const sectionList = groups[groupId];
					
					// Group Heading
					const heading = document.createElement('div');
					heading.className = 'group-title';
					heading.innerHTML = `<span>${meta.icon}</span> ${meta.title}`;
					container.appendChild(heading);
					
					// Grid for cards (Split into max 2 cards per row for beauty if many sections)
					const grid = document.createElement('div');
					grid.className = 'creations-grid';
					
					// For better UI, we can group specific sub-sections into cards
					// For now, let's create a main card for each group to keep it premium
					const card = document.createElement('div');
					card.className = 'cat-card';
					card.innerHTML = `
						<div class="cat-header">
							<div class="cat-icon ${meta.class}">${meta.emoji}</div>
							<h4>${meta.title}</h4>
						</div>
						<div class="cat-links">
							${sectionList.map(sec => `
								<a href="files/gallery.html?section=${sec}" class="cat-link">${humanize(sec)}</a>
							`).join('')}
						</div>
					`;
					grid.appendChild(card);
					container.appendChild(grid);
				});

			} catch (err) {
				console.error('Dynamic load failed:', err);
				container.innerHTML = '<p style="text-align:center; color:#e74c3c; padding: 20px;">Unable to load content. Please check your connection.</p>';
			}
		}

		document.addEventListener('DOMContentLoaded', initDynamicHome);
	</script>



	<script>
		// ============================================
		// PWA: Service Worker Registration & Install
		// ============================================
		let deferredPrompt;
		const installBtn = document.getElementById('installBtn');
        const installPrompt = document.getElementById('installPrompt');
        const btnInstallPopup = document.getElementById('btnInstallNowPopup');
        const btnCancelPopup = document.getElementById('btnCancelInstall');

		if ('serviceWorker' in navigator) {
			navigator.serviceWorker.register('sw.js')
				.then(reg => console.log('✓ SW registered'))
				.catch(err => console.log('✗ SW failed', err));
		}

		window.addEventListener('beforeinstallprompt', (e) => {
			e.preventDefault();
			deferredPrompt = e;
			installBtn.style.display = 'inline-block';

            // Show popup logic
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
            if (!isStandalone) {
                setTimeout(() => {
                    installPrompt.classList.add('visible');
                }, 2000);
            }
		});

		installBtn.addEventListener('click', async () => {
			if (!deferredPrompt) return;
			deferredPrompt.prompt();
			const { outcome } = await deferredPrompt.userChoice;
			deferredPrompt = null;
			installBtn.style.display = 'none';
            installPrompt.classList.remove('visible');
		});

        btnInstallPopup.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
            installPrompt.classList.remove('visible');
            installBtn.style.display = 'none';
        });

        if (btnCancelPopup) {
            btnCancelPopup.addEventListener('click', () => {
                installPrompt.classList.remove('visible');
            });
        }

		window.addEventListener('appinstalled', () => {
			installBtn.style.display = 'none';
            installPrompt.classList.remove('visible');
		});
	</script>
</body>
</html>
